# claude-code-anyllm - provider list
#
# Format (pipe-delimited, 5 fields):
#   id | label | base_url | model | key_env
#
#   id       short name, used with  -Provider <id>  /  --provider <id>
#   label    shown in the interactive menu
#   base_url OpenAI-compatible /v1 endpoint
#   model    model name exactly as the provider spells it
#             (must support tool/function calling, otherwise Claude Code
#             can only reply with text - it won't be able to edit files)
#   key_env  environment variable this provider reads its API key from
#
# Add a line to add a provider - no code changes needed. Set the matching
# env var once and it'll show as "[key set]" in the menu:
#   Windows:      setx LLM_API_KEY_NVIDIA "sk-..."      (new terminal after)
#   macOS/Linux:  export LLM_API_KEY_NVIDIA="sk-..."    (add to ~/.zshrc etc.)
#
# Lines starting with # and blank lines are ignored.

fpt|FPT Cloud - DeepSeek V4 Flash|https://mkp-api.fptcloud.com/v1|DeepSeek-V4-Flash|LLM_API_KEY_FPT
nvidia|NVIDIA NIM - Qwen2.5 Coder 32B|https://integrate.api.nvidia.com/v1|qwen/qwen2.5-coder-32b-instruct|LLM_API_KEY_NVIDIA
gemini|Google Gemini 2.5 Flash|https://generativelanguage.googleapis.com/v1beta/openai/|gemini-2.5-flash|LLM_API_KEY_GEMINI
github|GitHub Models - GPT-4o mini|https://models.inference.ai.azure.com|gpt-4o-mini|LLM_API_KEY_GITHUB
groq|Groq - Llama 3.3 70B Versatile|https://api.groq.com/openai/v1|llama-3.3-70b-versatile|LLM_API_KEY_GROQ
