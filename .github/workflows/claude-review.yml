# Two jobs:
#   tests  - runs the offline policy-ci + red-team suites on Linux AND Windows.
#            No secrets needed; gates every push to main and every PR.
#   review - AI review of the PR diff via Groq's free tier.
#            Add GROQ_API_KEY to repo Settings → Secrets and Variables → Actions.

name: CI (tests + PR review)

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [main]

permissions:
  pull-requests: write
  contents: read

jobs:
  # Deterministic, offline suites. The bash runner also parses the .ps1 files via
  # pwsh (preinstalled on the Linux runner), so both launchers are covered on both OSes.
  tests:
    name: tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Run suites (bash)
        if: runner.os != 'Windows'
        run: bash tests/run-tests.sh

      - name: Run suites (PowerShell)
        if: runner.os == 'Windows'
        shell: pwsh
        run: pwsh -File tests/run-tests.ps1

  review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install LiteLLM proxy
        run: pip install --quiet "litellm>=1.50,<2"

      - name: Write proxy config
        run: |
          mkdir -p /tmp/cbcfg
          printf '%s\n' \
            'model_list:' \
            '  - model_name: claude-sonnet-4-6' \
            '    litellm_params:' \
            '      model: openai/llama-3.3-70b-versatile' \
            '      api_base: https://api.groq.com/openai/v1' \
            '      api_key: os.environ/GROQ_API_KEY' \
            > /tmp/cbcfg/config.yaml

      - name: Start proxy
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          nohup litellm --config /tmp/cbcfg/config.yaml --port 4000 > /tmp/litellm.log 2>&1 &
          for i in $(seq 1 20); do
            curl -fsS http://localhost:4000/health/liveliness >/dev/null 2>&1 && echo "Proxy ready" && break
            sleep 2
          done

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code --quiet

      - name: Review PR
        env:
          ANTHROPIC_BASE_URL: http://localhost:4000
          ANTHROPIC_AUTH_TOKEN: dummy
          ANTHROPIC_MODEL: claude-sonnet-4-6
          ANTHROPIC_DEFAULT_HAIKU_MODEL: claude-sonnet-4-6
          ANTHROPIC_DEFAULT_SONNET_MODEL: claude-sonnet-4-6
          ANTHROPIC_DEFAULT_OPUS_MODEL: claude-sonnet-4-6
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DIFF="$(git diff HEAD~1 | head -c 8000)"
          REVIEW="$(claude --print "You are a senior code reviewer. Review this git diff and give concise feedback — 5-10 bullets max covering bugs, security issues, and code quality. No praise, just actionable findings.

          \`\`\`diff
          $DIFF
          \`\`\`" 2>&1 || echo "_Review unavailable — check workflow logs._")"

          # Build the body in a file: a bare "${REVIEW}" at column 0 would end the
          # YAML block scalar (invalid workflow), and indenting it would turn the
          # comment into a markdown code block.
          {
            printf '## 🤖 Claude Code Review\n\n'
            printf '%s\n\n' "$REVIEW"
            printf '%s\n' '<sub>Powered by [claude-code-anyllm](https://github.com/manhds82/claude-code-anyllm) · Groq free tier</sub>'
          } > "$RUNNER_TEMP/review.md"
          gh pr comment "${{ github.event.pull_request.number }}" --body-file "$RUNNER_TEMP/review.md"
